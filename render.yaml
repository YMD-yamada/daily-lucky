services:
  - type: web
    name: daily-lucky
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 3000
      - key: NOTIFY_CRON
        value: 0 7 * * *
      - key: NOTIFY_TIMEZONE
        value: Asia/Tokyo
      - key: NTFY_BASE_URL
        value: https://ntfy.sh
      - key: NTFY_TOPIC
        sync: false
      - key: ENABLE_PUBLIC_TUNNEL
        value: false
      - key: PUBLIC_TUNNEL_PROVIDER
        value: cloudflared
      - key: RAKUTEN_AFF_QUERY
        sync: false
      - key: RAKUTEN_AFF_WRAPPER_BASE
        sync: false
      - key: AMAZON_ASSOCIATE_TAG
        sync: false
