<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Lucky</title>
    <style>
      :root { --bg:#0b1022; --surface:#121a35; --line:#28345f; --text:#eef2ff; --muted:#9fb0db; --primary:#5f7dff; --ok:#3ddc97; --danger:#ff7b7b; }
      *{box-sizing:border-box}
      body{margin:0;font-family:"Segoe UI",Meiryo,sans-serif;background:linear-gradient(180deg,#0b1022,#070b18);color:var(--text)}
      .wrap{max-width:980px;margin:0 auto;padding:20px}
      .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}
      h1{margin:0;font-size:24px}
      .muted{color:var(--muted);font-size:13px}
      .panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
      .row{display:flex;gap:8px;flex-wrap:wrap}
      select,input,button{height:40px;border-radius:10px;border:1px solid var(--line);background:#0f1730;color:var(--text);padding:0 12px}
      button{cursor:pointer;font-weight:600}
      .primary{background:var(--primary);border-color:transparent}
      .ghost{background:#172245}
      .meta{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:10px}
      .badge{font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
      .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px;margin-top:14px}
      .card{background:#0f1730;border:1px solid var(--line);border-radius:12px;padding:12px}
      .card img.preview{width:100%;height:140px;object-fit:contain;background:#0b1230;border-radius:10px;border:1px solid #2a3967}
      .rank{font-weight:800;font-size:18px}
      .line{margin-top:6px;font-size:14px;color:var(--muted)}
      .line strong{color:var(--text)}
      .dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;margin-right:6px;border:1px solid #fff8}
      a{color:#c9d7ff}
      .status{margin-top:8px;min-height:20px;color:var(--muted)}
      .footer{margin-top:8px;font-size:12px;color:var(--muted)}
      .sources{margin-top:8px;padding-left:16px}
      .sources li{margin-top:4px;font-size:12px}
      .switch{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--text);padding:8px 12px;border:1px solid var(--line);border-radius:12px;background:#0f1730}
      .switch input{width:22px;height:22px;accent-color:var(--primary)}
      @media (max-width:700px){.top{flex-direction:column;align-items:flex-start}}
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="top">
        <div>
          <h1>Daily Lucky</h1>
          <div class="muted">お気に入り優先・必要情報だけを表示</div>
        </div>
        <label class="switch"><input id="showAll" type="checkbox" /> 全星座表示</label>
      </div>

      <section class="panel">
        <div class="row">
          <select id="signSelect" aria-label="星座"></select>
          <input id="birthdayInput" type="date" />
          <button id="saveProfileBtn" class="ghost">お気に入り保存</button>
          <button id="refreshBtn" class="primary">更新</button>
          <button id="notifyBtn" class="ghost">通知テスト</button>
        </div>
        <div class="meta">
          <span id="sourceBadge" class="badge">参照元: -</span>
          <span id="notifyBadge" class="badge">通知先: 確認中</span>
          <span id="storeBadge" class="badge">ストア: 確認中</span>
        </div>
        <div id="status" class="status"></div>
      </section>

      <section id="cards" class="cards" aria-live="polite"></section>
      <div id="footer" class="footer"></div>
    </main>

    <script>
      const profileKey = "daily-lucky-profile-v2";
      const signSelect = document.getElementById("signSelect");
      const birthdayInput = document.getElementById("birthdayInput");
      const showAll = document.getElementById("showAll");
      const cards = document.getElementById("cards");
      const sourceBadge = document.getElementById("sourceBadge");
      const notifyBadge = document.getElementById("notifyBadge");
      const storeBadge = document.getElementById("storeBadge");
      const statusEl = document.getElementById("status");
      const footer = document.getElementById("footer");

      function getSignFromBirthday(dateStr) {
        if (!dateStr) return "";
        const d = new Date(dateStr), m = d.getMonth() + 1, day = d.getDate();
        if ((m === 3 && day >= 21) || (m === 4 && day <= 19)) return "牡羊座";
        if ((m === 4 && day >= 20) || (m === 5 && day <= 20)) return "牡牛座";
        if ((m === 5 && day >= 21) || (m === 6 && day <= 21)) return "双子座";
        if ((m === 6 && day >= 22) || (m === 7 && day <= 22)) return "蟹座";
        if ((m === 7 && day >= 23) || (m === 8 && day <= 22)) return "獅子座";
        if ((m === 8 && day >= 23) || (m === 9 && day <= 22)) return "乙女座";
        if ((m === 9 && day >= 23) || (m === 10 && day <= 23)) return "天秤座";
        if ((m === 10 && day >= 24) || (m === 11 && day <= 22)) return "蠍座";
        if ((m === 11 && day >= 23) || (m === 12 && day <= 21)) return "射手座";
        if ((m === 12 && day >= 22) || (m === 1 && day <= 19)) return "山羊座";
        if ((m === 1 && day >= 20) || (m === 2 && day <= 18)) return "水瓶座";
        return "魚座";
      }

      function loadProfile(){ try{return JSON.parse(localStorage.getItem(profileKey)||"{}")}catch{return{}}}
      function saveProfile(p){ localStorage.setItem(profileKey, JSON.stringify(p)); }
      function setStatus(msg, error=false){ statusEl.textContent = msg; statusEl.style.color = error ? "var(--danger)" : "var(--muted)"; }

      function cardHtml(row){
        return `<article class="card">
          <img class="preview" src="${row.imageUrl || ""}" alt="${row.item}のイメージ" loading="lazy" />
          <div class="rank">#${row.rank} ${row.sign}</div>
          <div class="line"><span class="dot" style="background:${row.colorHex||"#fff"}"></span><strong>${row.color}</strong></div>
          <div class="line">アイテム: <strong>${row.item}</strong></div>
          <div class="line">候補: <strong>${row.name}</strong></div>
          <div class="line">ストア: <strong>${row.provider}</strong></div>
          <div class="line">信頼度: <strong>${row.credibility?.score || "-"} / 100</strong>（${row.credibility?.note || ""}）</div>
          <div class="line"><a href="${row.productUrl}" data-product-id="${row.productId}" data-keyword-key="${row.keywordKey}" data-product-name="${row.name}" target="_blank" rel="noopener noreferrer">商品ページを開く</a></div>
          <div class="line"><a href="${row.altLinks?.rakuten || "#"}" target="_blank" rel="noopener noreferrer">楽天</a> / <a href="${row.altLinks?.amazon || "#"}" target="_blank" rel="noopener noreferrer">Amazon</a></div>
          <ul class="sources">
            ${(row.credibility?.references || []).map((r) => `<li><a href="${r.searchUrl}" target="_blank" rel="noopener noreferrer">${r.name}の検索結果</a></li>`).join("")}
          </ul>
        </article>`;
      }

      async function loadNotify(){
        try{
          const json = await (await fetch("/api/notify-target")).json();
          if(!json.configured){ notifyBadge.textContent="通知先: 未設定"; return; }
          const masked = json.topic.length>6 ? `${json.topic.slice(0,2)}***${json.topic.slice(-2)}` : "***";
          notifyBadge.textContent = `通知先: ${masked}`;
        }catch{ notifyBadge.textContent="通知先: 確認失敗"; }
      }

      async function loadSigns() {
        const signs = await (await fetch("/api/signs")).json();
        signSelect.innerHTML = signs.map((s)=>`<option value="${s}">${s}</option>`).join("");
        const p = loadProfile();
        if (p.birthday) birthdayInput.value = p.birthday;
        const fromBirthday = getSignFromBirthday(p.birthday || "");
        signSelect.value = p.favoriteSign || fromBirthday || signs[0];
      }

      async function loadData() {
        try {
          setStatus("取得中...");
          const favorite = signSelect.value;
          const q = showAll.checked ? "" : `?sign=${encodeURIComponent(favorite)}`;
          const json = await (await fetch(`/api/today${q}`)).json();
          const list = Array.isArray(json.data) ? json.data : [];
          sourceBadge.textContent = `参照元: ${(json.sourcesUsed || []).join(", ") || "-"}`;
          cards.innerHTML = list.map(cardHtml).join("");
          const cfg = await (await fetch("/api/affiliate-config")).json();
          storeBadge.textContent = `ストア: ${cfg.preferredStore}`;
          footer.textContent = `${list.length}件表示 / お気に入り: ${favorite} / Amazonタグ: ${cfg.amazonAssociateEnabled ? "設定済み" : "未設定"} / 楽天アフィ: ${cfg.rakutenAffiliateEnabled ? "設定済み" : "未設定"}`;
          setStatus("最新データに更新しました。");
          document.querySelectorAll("a[data-product-id]").forEach((a) => {
            fetch("/api/impression", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                productId: a.dataset.productId,
                keywordKey: a.dataset.keywordKey,
              }),
            }).catch(() => {});
            a.addEventListener("click", () => {
              fetch("/api/click", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  productId: a.dataset.productId,
                  keywordKey: a.dataset.keywordKey,
                  productName: a.dataset.productName,
                }),
              }).catch(() => {});
            });
          });
        } catch (e) {
          setStatus(e.message || "取得に失敗しました", true);
        }
      }

      async function notifyNow(){
        try{
          setStatus("通知送信中...");
          const json = await (await fetch("/api/notify-now", {method:"POST"})).json();
          if(!json.ok) throw new Error(json.error || "通知に失敗");
          setStatus("通知を送信しました。");
        }catch(e){ setStatus(e.message, true); }
      }

      document.getElementById("refreshBtn").addEventListener("click", loadData);
      document.getElementById("notifyBtn").addEventListener("click", notifyNow);
      document.getElementById("saveProfileBtn").addEventListener("click", () => {
        const birthday = birthdayInput.value;
        const favoriteSign = signSelect.value || getSignFromBirthday(birthday);
        saveProfile({ birthday, favoriteSign });
        setStatus("お気に入り設定を保存しました。");
      });
      birthdayInput.addEventListener("change", () => {
        const sign = getSignFromBirthday(birthdayInput.value);
        if (sign) signSelect.value = sign;
      });
      signSelect.addEventListener("change", loadData);
      showAll.addEventListener("change", loadData);

      loadNotify();
      loadSigns().then(loadData).catch((e)=>setStatus(e.message,true));
    </script>
  </body>
</html>
